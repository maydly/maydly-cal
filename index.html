<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maydly — 예약 가능 시간 확인</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fefefe;--bg2:#f7f9f7;--sf:#fff;--sf2:#f5f8f5;--sf3:#eef3ee;
  --bd:#e2ebe2;--bd2:#cddccd;
  --tx:#2a3a2a;--mu:#7a9a7a;--mu2:#5a7a5a;
  --R:#7ab87a;--Rl:rgba(122,184,122,.1);--Rd:#5a9a5a;
  --ok:#6ab87a;--ng:#c86060;--r:8px;
}
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LANDING */
#landing{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;padding:40px 20px;
}
.land-clover-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}

/* ── 네잎클로버 ── */
/* 심볼 하나를 색·크기만 바꿔 로고·배경·달력에서 함께 쓴다 */
.cl-leaves{fill:url(#cl-leaf);stroke:#5a9a5a;stroke-width:1.4;stroke-linejoin:round}
.cl-veins{stroke:#4e8a52;stroke-width:1.1;opacity:.45}
.cl-stem{stroke:#5a9a5a;stroke-width:2.6}

/* 랜딩 로고 — 크고 또렷하게, 살짝 흔들린다 */
.cl-logo{width:96px;height:106px;margin-bottom:18px;filter:drop-shadow(0 6px 14px rgba(90,154,90,.22));animation:cl-sway 6s ease-in-out infinite;transform-origin:50% 90%}
@keyframes cl-sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

/* 배경 클로버 — 연한 색으로 흩뿌리고 천천히 떠다닌다 */
.cl-bg{position:absolute;opacity:.5;animation:cl-float 14s ease-in-out infinite}
.cl-bg .cl-leaves{fill:url(#cl-leaf-soft);stroke:#b7dcb7;stroke-width:1}
.cl-bg .cl-veins{stroke:#a6d0a6;opacity:.5}
.cl-bg .cl-stem{stroke:#b7dcb7;stroke-width:2.2}
.cl-bg1{width:250px;height:270px;top:-42px;right:-46px;opacity:.4;transform:rotate(18deg);animation-delay:0s}
.cl-bg2{width:190px;height:206px;bottom:-40px;left:-34px;opacity:.42;transform:rotate(-22deg);animation-delay:2.5s}
.cl-bg3{width:104px;height:114px;top:34%;left:7%;opacity:.34;transform:rotate(12deg);animation-delay:5s}
.cl-bg4{width:78px;height:86px;top:56%;right:9%;opacity:.36;transform:rotate(-14deg);animation-delay:1.2s}
.cl-bg5{width:52px;height:58px;top:17%;left:24%;opacity:.3;transform:rotate(28deg);animation-delay:3.8s}
.cl-bg6{width:44px;height:48px;bottom:16%;right:26%;opacity:.28;transform:rotate(-8deg);animation-delay:6.4s}
@keyframes cl-float{0%,100%{translate:0 0}50%{translate:0 -12px}}
@media(prefers-reduced-motion:reduce){.cl-logo,.cl-bg{animation:none}}

/* 달력 헤더 로고 */
.cl-hdr{width:19px;height:21px;flex-shrink:0}
/* 예약 가능한 날 표시에 붙는 작은 클로버 — '이 날은 운 좋게 자리가 있다' */
.cl-pill{width:9px;height:10px;flex-shrink:0;vertical-align:-1px}

/* CAL PAGE */
#calPage{display:none;flex-direction:column;min-height:100vh;background:var(--bg)}
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:50px;border-bottom:1px solid var(--bd);background:var(--sf);
  flex-shrink:0;
}
.hdr-logo{display:flex;align-items:center;gap:6px}
.hdr-logo-text{
  font-family:Georgia,serif;font-weight:300;font-style:italic;
  font-size:18px;color:var(--mu2);letter-spacing:1px;
}
.hdr-nav{display:flex;align-items:center;gap:6px}
.nb{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  padding:4px 10px;border-radius:20px;cursor:pointer;font-size:11px;transition:border-color .15s;
}
.nb:hover{border-color:var(--R)}
.ml{font-size:13px;font-weight:600;min-width:90px;text-align:center;color:var(--tx)}
.hdr-right{display:flex;align-items:center;gap:8px}
.back-btn{
  background:none;border:1px solid var(--bd);color:var(--mu);
  padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;transition:all .2s;
}
.back-btn:hover{border-color:var(--R);color:var(--Rd)}

.cal-wrap{padding:12px;max-width:900px;margin:0 auto;width:100%}
.mg-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.dl{text-align:center;font-size:9px;color:var(--mu);font-weight:700;padding:4px 0;letter-spacing:.5px}
.mg{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:auto;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.mc{
  background:var(--sf);padding:5px;min-height:72px;cursor:pointer;
  display:flex;flex-direction:column;gap:2px;transition:background .1s;
}
.mc:hover{background:var(--sf2)}
.mc.dim{opacity:.35;background:var(--bg2)}
.mc.tdc{background:var(--Rl)}
.dn{font-size:9px;color:var(--mu);font-weight:600;margin-bottom:2px;flex-shrink:0}
.tdc .dn{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--R);color:#fff;font-size:8px;font-weight:800}
.avail-pill{font-size:7px;padding:2px 5px;border-radius:8px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.ng-full{font-size:7px;color:#c04040;font-weight:600;line-height:1.4;padding:2px 0}

/* LEGEND */
.legend-bar{
  display:flex;align-items:center;gap:12px;padding:8px 12px;
  background:var(--sf2);border:1px solid var(--bd);border-radius:8px;margin-bottom:10px;
  font-size:10px;color:var(--mu2);
}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* KAKAO STICKY */
.kakao-sticky{
  position:fixed;bottom:16px;right:16px;z-index:200;
}
.kakao-btn{
  display:flex;align-items:center;gap:8px;
  background:#FEE500;border:none;border-radius:14px;
  padding:12px 18px;cursor:pointer;
  font-size:12px;font-weight:700;color:#3A1D1D;
  box-shadow:0 4px 16px rgba(0,0,0,.15);transition:filter .15s;text-decoration:none;
}
.kakao-btn:hover{filter:brightness(.96)}

/* POPUP */
.ov{position:fixed;inset:0;background:rgba(30,40,30,.35);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.pn{background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:360px;max-width:90vw;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.pn-h{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.px{background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;opacity:.6;transition:opacity .15s;line-height:1}
.px:hover{opacity:1}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--bd);color:var(--Rd);padding:10px 22px;border-radius:30px;font-size:11px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.toast.on{opacity:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:.px}
</style>
</head>
<body>

<!-- ── 네잎클로버 그라디언트 정의 (색은 CSS/속성, 도형은 아래 JS가 채운다) ── -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="cl-leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5d7a5"/>
      <stop offset="100%" stop-color="#68ac6d"/>
    </linearGradient>
    <linearGradient id="cl-leaf-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c6e6c6"/>
      <stop offset="100%" stop-color="#9acb9a"/>
    </linearGradient>
  </defs>
</svg>

<!-- LANDING -->
<div id="landing">
  <div class="land-clover-wrap">
    <svg class="cl-bg cl-bg1 cl-slot" viewBox="-40 -40 80 88"></svg>
    <svg class="cl-bg cl-bg2 cl-slot" viewBox="-40 -40 80 88"></svg>
    <svg class="cl-bg cl-bg3 cl-slot" viewBox="-40 -40 80 88"></svg>
    <svg class="cl-bg cl-bg4 cl-slot" viewBox="-40 -40 80 88"></svg>
    <svg class="cl-bg cl-bg5 cl-slot" viewBox="-40 -40 80 88"></svg>
    <svg class="cl-bg cl-bg6 cl-slot" viewBox="-40 -40 80 88"></svg>
  </div>

  <div style="text-align:center;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">
    <svg class="cl-logo cl-slot" viewBox="-40 -40 80 88"></svg>
    <div style="font-size:40px;font-weight:300;color:#3a5a3a;letter-spacing:2px;font-family:Georgia,serif;font-style:italic;line-height:1;margin-bottom:10px">maydly</div>
    <div style="font-size:12px;color:#8aaa8a;letter-spacing:.5px;line-height:1.8;margin-bottom:40px">나를 이해하고 기록하는 촬영</div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <button onclick="goCalendar()" style="
        display:flex;align-items:center;justify-content:center;gap:10px;
        background:var(--R);border:none;border-radius:12px;
        padding:14px 36px;cursor:pointer;
        font-size:14px;font-weight:700;color:#fff;
        width:240px;transition:background .15s;
        box-shadow:0 2px 12px rgba(122,184,122,.35);
      " onmouseover="this.style.background='var(--Rd)'" onmouseout="this.style.background='var(--R)'">
        📅 &nbsp;예약 가능 시간 확인하기
      </button>
      <a href="https://pf.kakao.com/_pxnxgbn/chat" target="_blank" style="
        display:flex;align-items:center;justify-content:center;gap:10px;
        background:#FEE500;border:none;border-radius:12px;
        padding:14px 36px;cursor:pointer;
        font-size:14px;font-weight:700;color:#3A1D1D;
        width:240px;transition:filter .15s;
        box-shadow:0 2px 12px rgba(0,0,0,.08);text-decoration:none;
      " onmouseover="this.style.filter='brightness(.96)'" onmouseout="this.style.filter='none'">
        <svg width="20" height="18" viewBox="0 0 20 18" fill="none"><path d="M10 0C4.477 0 0 3.358 0 7.5c0 2.67 1.756 5.013 4.398 6.395L3.25 18l5.134-3.37c.527.074 1.068.12 1.616.12 5.523 0 10-3.358 10-7.5S15.523 0 10 0z" fill="#3A1D1D"/></svg>
        카카오로 문의하기
      </a>
    </div>
  </div>
</div>

<!-- CALENDAR PAGE -->
<div id="calPage">
  <div class="cal-header">
    <div class="hdr-logo">
      <svg class="cl-hdr cl-slot" viewBox="-40 -40 80 88"></svg>
      <span class="hdr-logo-text">maydly</span>
    </div>
    <div class="hdr-nav">
      <button class="nb" onclick="chM(-1)">‹</button>
      <button class="nb" onclick="goToday()">오늘</button>
      <button class="nb" onclick="chM(1)">›</button>
      <div class="ml" id="calLabel"></div>
    </div>
    <div class="hdr-right">
      <button class="back-btn" onclick="goLanding()">← 홈</button>
    </div>
  </div>

  <div class="cal-wrap">
    <div id="noDataBanner" style="display:none;background:rgba(200,164,86,.12);border:1px solid #c8a456;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:11px;color:#7a6030;line-height:1.7">
      ⚠️ 현재 일정 정보를 불러오지 못했습니다. 날짜를 클릭하면 카카오로 직접 문의하실 수 있습니다.
    </div>
    <div id="legendBar" class="legend-bar">
      <span class="leg-dot" style="background:#6ab87a"></span><span>촬영 가능</span>
      <span class="leg-dot" style="background:#c86060"></span><span>예약 불가</span>
      <span style="margin-left:auto;font-size:10px;color:var(--mu)">날짜를 클릭하면 시간대별 확인 가능합니다</span>
    </div>
    <div class="mg-hdr">
      <div class="dl">일</div><div class="dl">월</div><div class="dl">화</div>
      <div class="dl">수</div><div class="dl">목</div><div class="dl">금</div><div class="dl">토</div>
    </div>
    <div class="mg" id="calGrid"></div>
    <div id="gcalStatus" style="margin-top:8px;font-size:10px;color:var(--mu);text-align:right"></div>
  </div>
</div>

<!-- KAKAO STICKY -->
<div class="kakao-sticky" id="kakaoSticky" style="display:none">
  <a href="https://pf.kakao.com/_pxnxgbn/chat" target="_blank" class="kakao-btn">
    <svg width="18" height="16" viewBox="0 0 20 18"><path d="M10 0C4.477 0 0 3.358 0 7.5c0 2.67 1.756 5.013 4.398 6.395L3.25 18l5.134-3.37c.527.074 1.068.12 1.616.12 5.523 0 10-3.358 10-7.5S15.523 0 10 0z" fill="#3A1D1D"/></svg>
    카카오로 문의
  </a>
</div>

<!-- POPUP -->
<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="pn">
    <div class="pn-h" id="pnh">-<button class="px" onclick="closeP()">×</button></div>
    <div id="pb"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── 네잎클로버 (A안 — 하트 잎 4장). 도형을 한 곳에서 정의해 로고·배경·달력에서 재사용 ──
const CLOVER_INNER=`
  <g class="cl-leaves">
    <path transform="rotate(-45)" d="M0,-3 C-11,-7 -20,-16 -15,-24 C-11,-30 -4,-29 0,-24 C4,-29 11,-30 15,-24 C20,-16 11,-7 0,-3Z"/>
    <path transform="rotate(45)"  d="M0,-3 C-11,-7 -20,-16 -15,-24 C-11,-30 -4,-29 0,-24 C4,-29 11,-30 15,-24 C20,-16 11,-7 0,-3Z"/>
    <path transform="rotate(135)" d="M0,-3 C-11,-7 -20,-16 -15,-24 C-11,-30 -4,-29 0,-24 C4,-29 11,-30 15,-24 C20,-16 11,-7 0,-3Z"/>
    <path transform="rotate(225)" d="M0,-3 C-11,-7 -20,-16 -15,-24 C-11,-30 -4,-29 0,-24 C4,-29 11,-30 15,-24 C20,-16 11,-7 0,-3Z"/>
  </g>
  <g class="cl-veins" fill="none" stroke-linecap="round">
    <path d="M0,0 L-10,-10"/><path d="M0,0 L10,-10"/><path d="M0,0 L10,10"/><path d="M0,0 L-10,10"/>
  </g>
  <path class="cl-stem" d="M0,4 C3,16 6,28 2,42" fill="none" stroke-linecap="round"/>`;
// 인라인용 완성 SVG (달력 pill 등 문자열로 넣는 곳)
function cloverSVG(cls){return`<svg class="${cls}" viewBox="-40 -40 80 88">${CLOVER_INNER}</svg>`;}
// 페이지의 빈 클로버 자리(.cl-slot)를 도형으로 채운다
function fillClovers(){document.querySelectorAll('.cl-slot').forEach(el=>{if(!el.dataset.filled){el.innerHTML=CLOVER_INNER;el.dataset.filled='1';}});}

// ── 유틸 (UTC 버그 방지) ──
function fd(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;}
function parseDS(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d);}
function dowOf(ds){return parseDS(ds).getDay();}
function pad(n){return String(n).padStart(2,'0');}

// ── 상수 ──
const TODAY=new Date(), TSTR=fd(TODAY);
const KAKAO_URL='https://pf.kakao.com/_pxnxgbn/chat';

// ── 공개 예약 데이터 (260715 v2.0) ──
// 예전에는 관리자가 내보낸 JSON 파일을 사람이 올려야 했다(안 올리면 낡은 정보가 노출됨).
// 이제는 관리자 서버의 공개용 API를 직접 읽는다 → 명진이 일정을 고치면 여기도 바로 최신.
// 이 API는 '가능/불가'만 내보내며, 고객명·연락처·메모는 애초에 들어있지 않다.
// 같은 사이트(GitHub Pages)에 올라간 공개 데이터. 관리자가 저장할 때마다 자동 갱신됨.
// (개인정보 없는 '가능/불가'만 담긴 파일 — 관리자 서버 함수 대신 GitHub 정적 파일로 읽는다)
const PUBLIC_API='./public.json';

// 이 데이터가 없거나 로딩 실패하면 기본 가능표를 절대 보여주지 않음
let publicSchedule = null;
let dataLoaded = false; // true여야만 가능/불가 표시

async function loadPublicData(){
  try{
    const res=await fetch(PUBLIC_API+'?t='+Date.now(),{cache:'no-store'});
    if(res.ok){
      const d=await res.json();
      if(d.schedule&&Object.keys(d.schedule).length>0){
        publicSchedule=d.schedule;
        dataLoaded=true;
        const el=document.getElementById('gcalStatus');
        if(el){
          const gen=d.generated?new Date(d.generated).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
          el.textContent=`일정 업데이트: ${gen}`;
        }
      }else{
        // schedule이 비어있으면 데이터 없음으로 처리
        dataLoaded=false;
      }
    }else{
      dataLoaded=false;
    }
  }catch(e){
    dataLoaded=false;
  }
  // 배너 표시 제어
  const banner=document.getElementById('noDataBanner');
  const legend=document.getElementById('legendBar');
  if(banner&&legend){
    banner.style.display=dataLoaded?'none':'block';
    legend.style.display=dataLoaded?'flex':'none';
  }
  renderCal();
}

// ── 예약 가능 슬롯 계산 ──
// 서버(공개 API)에서 받은 데이터가 있을 때만 '가능/불가'를 보여준다.
// 데이터를 못 받았으면 절대 임의로 '가능'이라고 말하지 않고, 카카오 문의 안내로 넘긴다.
// (예전 버전은 로딩 실패 시 기본 요일표를 '전부 가능'으로 보여줘, 꽉 찬 날도 가능해 보일 수 있었다)
const NO_DATA=[{noData:true}];
const UNAVAIL=[{avail:false,allDayBlock:true,label:'종일 외부 촬영 일정으로 인한 예약 불가'}];
function getMaydlySlots(ds){
  if(!dataLoaded||!publicSchedule) return NO_DATA;
  const pd=publicSchedule[ds];
  if(pd===undefined) return NO_DATA;          // 서버가 안 내려준 날짜(범위 밖) — 문의로
  if(pd.unavailable) return UNAVAIL;
  if(pd.slots) return pd.slots.map(s=>({avail:s.avail,allDayBlock:false,label:s.s+' ~ '+s.e}));
  return NO_DATA;
}

// ── 캘린더 상태 ──
let curDate=new Date(TODAY);

function goCalendar(){
  document.getElementById('landing').style.display='none';
  document.getElementById('calPage').style.display='flex';
  document.getElementById('calPage').style.flexDirection='column';
  document.getElementById('kakaoSticky').style.display='block';
  updLabel();
  renderCal();
  loadPublicData(); // admin에서 내보낸 공개 데이터 로드 (최우선)
}
function goLanding(){
  document.getElementById('landing').style.display='flex';
  document.getElementById('calPage').style.display='none';
  document.getElementById('kakaoSticky').style.display='none';
}
function chM(n){curDate.setMonth(curDate.getMonth()+n);updLabel();renderCal();}
function goToday(){curDate=new Date(TODAY);updLabel();renderCal();}
function updLabel(){
  const ms=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const el=document.getElementById('calLabel');
  if(el)el.textContent=`${curDate.getFullYear()}년 ${ms[curDate.getMonth()]}`;
}

function renderCal(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  let h='';
  for(let i=0;i<first;i++){
    const d=prev-first+1+i;
    h+=mCell(fd(new Date(y,m-1,d)),d,true);
  }
  for(let d=1;d<=days;d++)h+=mCell(fd(new Date(y,m,d)),d,false);
  const rem=(7-(first+days)%7)%7;
  for(let d=1;d<=rem;d++)h+=mCell(fd(new Date(y,m+1,d)),d,true);
  document.getElementById('calGrid').innerHTML=h;
}

function mCell(ds,dn,dim){
  const isT=ds===TSTR;
  const slots=getMaydlySlots(ds);
  let inner='';

  if(slots[0]?.noData){
    // 데이터 없음 — 셀에 아무것도 표시 안 함 (클릭하면 카카오 안내)
    inner='';
  }else if(slots.length===1&&slots[0].allDayBlock){
    inner=`<div class="ng-full">예약<br>불가</div>`;
  }else{
    const availCount=slots.filter(s=>s.avail).length;
    if(availCount>0){
      // 자리가 남은 날엔 클로버를 하나 띄운다
      inner=`<div class="avail-pill" style="background:rgba(106,184,122,.25);color:#3a7a4a;display:flex;align-items:center;gap:3px">
        ${cloverSVG('cl-pill')}${availCount}타임 가능</div>`;
    }else{
      inner=`<div class="avail-pill" style="background:rgba(212,96,64,.12);color:#c04040">예약 불가</div>`;
    }
  }

  return`<div class="mc${dim?' dim':''}${isT?' tdc':''}" onclick="openDaySlots('${ds}')">
    <div class="dn">${dn}</div>${inner}
  </div>`;
}

// ── 날짜 팝업 ──
function openDaySlots(ds){
  const slots=getMaydlySlots(ds);
  const[y,m,d]=ds.split('-');
  const DAYS=['일','월','화','수','목','금','토'];
  const dow=DAYS[dowOf(ds)];
  document.getElementById('pnh').innerHTML=`${parseInt(y)}년 ${parseInt(m)}월 ${parseInt(d)}일 (${dow})<button class="px" onclick="closeP()">×</button>`;
  let b='';
  if(slots[0]?.noData){
    // 데이터 없음 → 카카오 문의만
    b=`<div style="text-align:center;padding:20px 16px">
      <div style="font-size:32px;margin-bottom:12px">💬</div>
      <div style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px">현재 일정 확인이 필요합니다</div>
      <div style="font-size:12px;color:var(--mu);line-height:1.7;margin-bottom:16px">최신 예약 가능 정보는
<br>카카오로 직접 문의해주세요</div>
      <a href="${KAKAO_URL}" target="_blank" style="display:block;text-align:center;background:#FEE500;color:#3A1D1D;font-weight:700;font-size:13px;padding:13px;border-radius:10px;text-decoration:none">카카오로 문의하기</a>
    </div>`;
  }else if(slots.length===1&&slots[0].allDayBlock){
    b=`<div style="text-align:center;padding:24px 16px">
      <div style="font-size:36px;margin-bottom:12px">📷</div>
      <div style="color:#c86060;font-weight:700;font-size:14px;line-height:1.7">종일 외부 촬영 일정으로 인한<br>예약 불가</div>
    </div>`;
  }else{
    b=`<div style="margin-bottom:10px;font-size:11px;color:var(--mu)">시간대별 예약 가능 여부입니다</div>`;
    b+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    slots.forEach(s=>{
      const col=s.avail?'rgba(106,184,122,.15)':'rgba(212,96,64,.06)';
      const border=s.avail?'#6ab87a':'#e0c0c0';
      const textCol=s.avail?'#3a7a4a':'#b06060';
      const icon=s.avail?'✅':'—';
      b+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:${col};border:1px solid ${border};border-radius:10px">
        <span style="font-size:14px">${icon}</span>
        <div style="font-size:13px;font-weight:${s.avail?700:500};color:${textCol}">${s.label}</div>
      </div>`;
    });
    b+=`</div>`;
    const hasAvail=slots.some(s=>s.avail);
    if(hasAvail){
      b+=`<a href="${KAKAO_URL}" target="_blank" style="display:block;margin-top:14px;text-align:center;background:#FEE500;color:#3A1D1D;font-weight:700;font-size:13px;padding:13px;border-radius:10px;text-decoration:none">카카오로 예약 문의하기</a>`;
    }else{
      b+=`<div style="margin-top:12px;text-align:center;font-size:12px;color:var(--mu)">이 날은 예약 가능 시간이 없습니다</div>`;
      b+=`<a href="${KAKAO_URL}" target="_blank" style="display:block;margin-top:8px;text-align:center;border:1px solid var(--bd);color:var(--mu2);font-size:12px;padding:10px;border-radius:10px;text-decoration:none">다른 날짜로 문의하기</a>`;
    }
  }
  document.getElementById('pb').innerHTML=b;
  openP();
}

function openP(){document.getElementById('ov').style.display='flex';}
function closeP(){document.getElementById('ov').style.display='none';}
function ovClick(e){if(e.target===document.getElementById('ov'))closeP();}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}

// 페이지 뜨면 네잎클로버 도형을 각 자리에 채운다
fillClovers();
</script>
